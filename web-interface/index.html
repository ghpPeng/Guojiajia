<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw ↔ Claude Code 对话界面</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      background: #2d2d2d;
      padding: 20px;
      border-bottom: 2px solid #3d3d3d;
    }
    
    .header h1 {
      font-size: 24px;
      color: #4a9eff;
    }
    
    .header p {
      color: #888;
      margin-top: 5px;
    }
    
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .message {
      max-width: 80%;
      padding: 15px 20px;
      border-radius: 12px;
      line-height: 1.6;
      animation: fadeIn 0.3s;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.user {
      align-self: flex-end;
      background: #4a9eff;
      color: white;
    }
    
    .message.openclaw {
      align-self: flex-start;
      background: #2d2d2d;
      border-left: 4px solid #ff9800;
    }
    
    .message.claude {
      align-self: flex-start;
      background: #2d2d2d;
      border-left: 4px solid #4caf50;
    }
    
    .message .sender {
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 14px;
    }
    
    .message.user .sender { color: #fff; }
    .message.openclaw .sender { color: #ff9800; }
    .message.claude .sender { color: #4caf50; }
    
    .message .content {
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    
    .message .timestamp {
      font-size: 12px;
      color: #888;
      margin-top: 8px;
    }
    
    .input-container {
      background: #2d2d2d;
      padding: 20px;
      border-top: 2px solid #3d3d3d;
      display: flex;
      gap: 10px;
    }
    
    .input-container input {
      flex: 1;
      padding: 12px 20px;
      background: #1a1a1a;
      border: 2px solid #3d3d3d;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 16px;
    }
    
    .input-container input:focus {
      outline: none;
      border-color: #4a9eff;
    }
    
    .input-container button {
      padding: 12px 30px;
      background: #4a9eff;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .input-container button:hover {
      background: #3a8eef;
    }
    
    .input-container button:disabled {
      background: #555;
      cursor: not-allowed;
    }
    
    .status {
      padding: 10px 20px;
      background: #2d2d2d;
      border-bottom: 1px solid #3d3d3d;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
    }
    
    .status .indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4caf50;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .status.waiting .indicator {
      background: #ff9800;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 OpenClaw ↔ Claude Code 对话界面</h1>
    <p>实时查看和干预 AI 协作过程</p>
  </div>
  
  <div class="status" id="status">
    <div class="indicator"></div>
    <span>就绪</span>
  </div>
  
  <div class="chat-container" id="chat">
    <div class="message openclaw">
      <div class="sender">OpenClaw</div>
      <div class="content">你好！我是 OpenClaw，负责转发你和 Claude Code 之间的对话。

当前项目：Guojiajia（过家家）
工作目录：~/ghp/Guojiajia

你可以：
1. 发送任务给 Claude Code
2. 实时查看 Claude Code 的工作过程
3. 随时干预和调整

请输入你的需求...</div>
      <div class="timestamp">${new Date().toLocaleTimeString()}</div>
    </div>
  </div>
  
  <div class="input-container">
    <input type="text" id="input" placeholder="输入你的消息..." />
    <button id="send">发送</button>
  </div>
  
  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const status = document.getElementById('status');
    
    let isProcessing = false;
    
    function addMessage(sender, content, type = 'user') {
      const msg = document.createElement('div');
      msg.className = `message ${type}`;
      msg.innerHTML = `
        <div class="sender">${sender}</div>
        <div class="content">${content}</div>
        <div class="timestamp">${new Date().toLocaleTimeString()}</div>
      `;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }
    
    function setStatus(text, waiting = false) {
      status.className = waiting ? 'status waiting' : 'status';
      status.querySelector('span').textContent = text;
    }
    
    async function sendMessage() {
      const message = input.value.trim();
      if (!message || isProcessing) return;
      
      // 添加用户消息
      addMessage('你', message, 'user');
      input.value = '';
      
      isProcessing = true;
      sendBtn.disabled = true;
      setStatus('OpenClaw 处理中...', true);
      
      // 添加 OpenClaw 转发消息
      addMessage('OpenClaw', `收到任务，正在转发给 Claude Code...`, 'openclaw');
      
      try {
        // 调用后端 API
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });
        
        const data = await response.json();
        
        if (data.success) {
          // 添加 Claude Code 响应
          addMessage('Claude Code', data.response, 'claude');
          setStatus('就绪');
        } else {
          addMessage('OpenClaw', `错误：${data.error}`, 'openclaw');
          setStatus('错误');
        }
      } catch (error) {
        addMessage('OpenClaw', `连接失败：${error.message}`, 'openclaw');
        setStatus('错误');
      }
      
      isProcessing = false;
      sendBtn.disabled = false;
    }
    
    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
    
    // 自动聚焦输入框
    input.focus();
  </script>
</body>
</html>
