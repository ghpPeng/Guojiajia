<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw ↔ Claude Code 实时对话</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      background: #2d2d2d;
      padding: 20px;
      border-bottom: 2px solid #3d3d3d;
    }
    
    .header h1 {
      font-size: 24px;
      color: #4a9eff;
    }
    
    .header p {
      color: #888;
      margin-top: 5px;
    }
    
    .status {
      padding: 10px 20px;
      background: #2d2d2d;
      border-bottom: 1px solid #3d3d3d;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
    }
    
    .status .indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4caf50;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .status.working .indicator {
      background: #ff9800;
    }
    
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .message {
      max-width: 80%;
      padding: 15px 20px;
      border-radius: 12px;
      line-height: 1.6;
      animation: fadeIn 0.3s;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.user {
      align-self: flex-end;
      background: #4a9eff;
      color: white;
    }
    
    .message.openclaw {
      align-self: flex-start;
      background: #2d2d2d;
      border-left: 4px solid #ff9800;
    }
    
    .message.claude {
      align-self: flex-start;
      background: #2d2d2d;
      border-left: 4px solid #4caf50;
    }
    
    .message.streaming {
      animation: pulse 1s infinite;
    }
    
    .message .sender {
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 14px;
    }
    
    .message.user .sender { color: #fff; }
    .message.openclaw .sender { color: #ff9800; }
    .message.claude .sender { color: #4caf50; }
    
    .message .content {
      white-space: pre-wrap;
      word-wrap: break-word;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 14px;
    }
    
    .message .timestamp {
      font-size: 12px;
      color: #888;
      margin-top: 8px;
    }
    
    .input-container {
      background: #2d2d2d;
      padding: 20px;
      border-top: 2px solid #3d3d3d;
      display: flex;
      gap: 10px;
    }
    
    .input-container input {
      flex: 1;
      padding: 12px 20px;
      background: #1a1a1a;
      border: 2px solid #3d3d3d;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 16px;
    }
    
    .input-container input:focus {
      outline: none;
      border-color: #4a9eff;
    }
    
    .input-container button {
      padding: 12px 30px;
      background: #4a9eff;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .input-container button:hover {
      background: #3a8eef;
    }
    
    .input-container button:disabled {
      background: #555;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 OpenClaw ↔ Claude Code 实时对话</h1>
    <p>实时查看 Claude Code 的工作过程（流式输出）</p>
  </div>
  
  <div class="status" id="status">
    <div class="indicator"></div>
    <span>就绪</span>
  </div>
  
  <div class="chat-container" id="chat">
    <div class="message openclaw">
      <div class="sender">OpenClaw</div>
      <div class="content">你好！我是 OpenClaw，负责转发你和 Claude Code 之间的对话。

✨ 新功能：实时流式输出
现在你可以看到 Claude Code 的完整工作过程！

当前项目：Guojiajia（过家家）
工作目录：~/ghp/Guojiajia

请输入你的需求...</div>
      <div class="timestamp">${new Date().toLocaleTimeString()}</div>
    </div>
  </div>
  
  <div class="input-container">
    <input type="text" id="input" placeholder="输入你的消息..." />
    <button id="send">发送</button>
  </div>
  
  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const status = document.getElementById('status');
    
    let isProcessing = false;
    let currentClaudeMessage = null;
    
    // 连接 SSE
    const eventSource = new EventSource('/api/stream');
    
    eventSource.onmessage = (event) => {
      const data = JSON.parse(event.data);
      handleSSEMessage(data);
    };
    
    eventSource.onerror = () => {
      setStatus('连接断开，正在重连...', true);
    };
    
    function handleSSEMessage(data) {
      switch (data.type) {
        case 'connected':
          console.log('SSE 已连接');
          break;
          
        case 'message':
          addMessage(data.sender, data.content, data.sender);
          break;
          
        case 'stream':
          // 实时追加 Claude Code 的输出
          if (!currentClaudeMessage) {
            currentClaudeMessage = addMessage('Claude Code', '', 'claude', true);
          }
          appendToMessage(currentClaudeMessage, data.content);
          break;
          
        case 'complete':
          // Claude Code 完成
          if (currentClaudeMessage) {
            currentClaudeMessage.classList.remove('streaming');
            currentClaudeMessage = null;
          }
          isProcessing = false;
          sendBtn.disabled = false;
          setStatus('就绪');
          break;
          
        case 'error':
          addMessage('系统', `错误：${data.content}`, 'openclaw');
          isProcessing = false;
          sendBtn.disabled = false;
          setStatus('就绪');
          break;
      }
    }
    
    function addMessage(sender, content, type = 'user', streaming = false) {
      const msg = document.createElement('div');
      msg.className = `message ${type}${streaming ? ' streaming' : ''}`;
      msg.innerHTML = `
        <div class="sender">${sender}</div>
        <div class="content">${escapeHtml(content)}</div>
        <div class="timestamp">${new Date().toLocaleTimeString()}</div>
      `;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
      return msg;
    }
    
    function appendToMessage(msgElement, content) {
      const contentDiv = msgElement.querySelector('.content');
      contentDiv.textContent += content;
      chat.scrollTop = chat.scrollHeight;
    }
    
    function setStatus(text, working = false) {
      status.className = working ? 'status working' : 'status';
      status.querySelector('span').textContent = text;
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    async function sendMessage() {
      const message = input.value.trim();
      if (!message || isProcessing) return;
      
      input.value = '';
      isProcessing = true;
      sendBtn.disabled = true;
      setStatus('Claude Code 工作中...', true);
      
      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });
        
        if (!response.ok) {
          throw new Error('请求失败');
        }
        
      } catch (error) {
        addMessage('系统', `错误：${error.message}`, 'openclaw');
        isProcessing = false;
        sendBtn.disabled = false;
        setStatus('就绪');
      }
    }
    
    // 事件监听
    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
