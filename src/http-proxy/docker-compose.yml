version: '3.8'

services:
  mock-gateway:
    build:
      context: ./demo
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
    networks:
      - guojiajia-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(8080, 'localhost')"]
      interval: 5s
      timeout: 3s
      retries: 5

  http-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET:-docker-dev-secret-change-in-production}
      - JWT_EXPIRES_IN=7d
      - GATEWAY_WS_URL=ws://mock-gateway:8080
      - LOG_LEVEL=info
      - CORS_ORIGIN=http://localhost:8081
    depends_on:
      mock-gateway:
        condition: service_healthy
    networks:
      - guojiajia-network
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 3

  admin-dashboard:
    build:
      context: ../../admin-dashboard
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    depends_on:
      - http-proxy
    networks:
      - guojiajia-network

networks:
  guojiajia-network:
    driver: bridge
